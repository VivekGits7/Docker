## ============================================
## GitLab MCP Server - Docker Compose
## ============================================
##
## Uses @zereight/mcp-gitlab — a community MCP server that works
## with ANY GitLab plan (including free) via Personal Access Token.
## No OAuth required.
##
## HOW TO GET YOUR GITLAB TOKEN:
##
##   1. Go to https://gitlab.com/-/user_settings/personal_access_tokens
##   2. Click "Add new token"
##   3. Name: mcp-server
##   4. Scopes: api, read_user, read_repository
##   5. Click "Create personal access token"
##   6. Copy the token (starts with glpat-...)
##   7. Paste it in the .env file as GITLAB_TOKEN
##
## USAGE:
##
##   # Start the server
##   docker compose -f gitlab-mcp.yml up -d
##
##   # Verify
##   docker logs mcp-gitlab
##
## ============================================

services:

  # --- MCP: GitLab Server ---
  mcp-gitlab:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-alpine
        RUN npm install -g @anthropic-ai/sdk @zereight/mcp-gitlab
        WORKDIR /app
    image: mcp-gitlab:latest
    pull_policy: build
    container_name: mcp-gitlab
    stdin_open: true
    tty: false
    entrypoint: ["tail", "-f", "/dev/null"]
    environment:
      - GITLAB_PERSONAL_ACCESS_TOKEN=${GITLAB_TOKEN}
      - GITLAB_API_URL=https://${GITLAB_URL:-gitlab.com}/api/v4
    networks:
      - mcp_network
    restart: unless-stopped

networks:
  mcp_network:
    driver: bridge
